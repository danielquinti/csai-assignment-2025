upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name localhost;

    # Cabeceras de seguridad a nivel de Nginx
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Limitar tamaño del body para prevenir abusos
    client_max_body_size 5M;

    # Archivos estáticos servidos directamente por Nginx
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Proxy al servidor Django/Gunicorn
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevenir SSRF: no seguir redirecciones del upstream
        proxy_redirect off;

        # Timeouts razonables
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Denegar acceso a archivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
