<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}CSAI{% endblock %}</title>
    <style>
      :root { --bg:#0b1020; --card:#121a33; --text:#e7eaf3; --muted:#a9b2d6; --accent:#7aa2f7; --danger:#f7768e; }
      body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      header { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,.08); display:flex; align-items:center; justify-content:space-between; }
      .container { max-width: 960px; margin: 0 auto; padding: 20px; }
      .card { background: var(--card); border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 16px; }
      .row { display:flex; gap: 12px; align-items:center; }
      .muted { color: var(--muted); }
      table { width:100%; border-collapse: collapse; }
      th, td { text-align:left; padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,.08); }
      input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.03); color: var(--text); }
      button { padding: 10px 12px; border-radius: 10px; border: 0; background: var(--accent); color: #0b1020; font-weight: 600; cursor:pointer; }
      .btn-danger { background: var(--danger); }
      .actions { display:flex; gap: 10px; }
    </style>
  </head>
  <body>
    <header>
      <div class="row">
        <strong>Catálogo</strong>
        <span class="muted">CSAI</span>
      </div>
      <div class="actions">
        {% if user.is_authenticated %}
          <span class="muted">{{ user.get_username }}</span>
          <a href="{% url 'logout' %}">Salir</a>
        {% else %}
          <a href="{% url 'login' %}">Entrar</a>
        {% endif %}
      </div>
    </header>

    <main class="container">
      {% if messages %}
        <div class="card" style="margin-bottom: 12px;">
          {% for message in messages %}
            <div class="muted">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
