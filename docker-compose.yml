services:
  db:
    image: postgres:16-alpine
    env_file:
      - ./backend/.env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: ["sh", "/app/entrypoint.sh"]

volumes:
  postgres_data:
